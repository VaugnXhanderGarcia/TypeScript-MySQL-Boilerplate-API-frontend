<div class="col-md-6 offset-md-3 mt-5">
  <h3>Reset Password</h3>

  <div *ngIf="tokenStatus === 'Validating'">
    Validating token...
  </div>

  <div *ngIf="tokenStatus === 'Invalid'" class="alert alert-danger">
    Invalid token. Please request a new password reset link.
  </div>

  <form *ngIf="tokenStatus === 'Valid'" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input
        type="password"
        formControlName="password"
        class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
      />

      <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
        <div *ngIf="f['password'].errors['required']">Password is required</div>
        <div *ngIf="f['password'].errors['minlength']">
          Password must be at least 6 characters
        </div>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Confirm Password</label>
      <input
        type="password"
        formControlName="confirmPassword"
        class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
      />

      <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
        <div *ngIf="f['confirmPassword'].errors['required']">
          Confirm Password is required
        </div>
        <div *ngIf="f['confirmPassword'].errors['mustMatch']">
          Passwords must match
        </div>
      </div>
    </div>

    <button [disabled]="loading" class="btn btn-primary">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
      Reset Password
    </button>

    <a routerLink="/account/login" class="btn btn-link">Cancel</a>
  </form>
</div>
