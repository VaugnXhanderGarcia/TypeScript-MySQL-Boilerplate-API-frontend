<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="mb-4">Reset Your Password</h2>

      <div *ngIf="validating" class="alert alert-info">
        <span class="spinner-border spinner-border-sm me-2"></span>
        Validating reset link...
      </div>

      <div *ngIf="!validating && !tokenValid" class="alert alert-danger">
        <strong>Error:</strong> This reset link is invalid or has expired. Please request a new password reset.
        <br><br>
        <a routerLink="/account/forgot-password" class="btn btn-primary btn-sm">Request New Reset Link</a>
      </div>

      <form *ngIf="tokenValid" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input
            type="password"
            formControlName="password"
            class="form-control"
            [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
            placeholder="Enter new password" />

          <div *ngIf="submitted && f['password'].errors" class="invalid-feedback d-block">
            <div *ngIf="f['password'].errors['required']">Password is required</div>
            <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input
            type="password"
            formControlName="confirmPassword"
            class="form-control"
            [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
            placeholder="Confirm new password" />

          <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback d-block">
            <div *ngIf="f['confirmPassword'].errors['required']">Please confirm your password</div>
            <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
          </div>
        </div>

        <button type="submit" [disabled]="loading" class="btn btn-primary w-100">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>

        <div class="mt-3 text-center">
          <a routerLink="/account/login" class="btn btn-link">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
