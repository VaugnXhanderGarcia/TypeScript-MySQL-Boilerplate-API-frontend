<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-lg p-4" style="max-width: 430px; width: 100%;">
    <h3 class="card-title text-center mb-4">Reset Your Password</h3>

    <div *ngIf="errorMessage && !validToken" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form *ngIf="validToken" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">New Password</label>

        <input
          type="password"
          formControlName="password"
          class="form-control"
          placeholder="Enter new password"
          [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
        />

        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback d-block">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">
            Password must be at least 6 characters
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Confirm Password</label>

        <input
          type="password"
          formControlName="confirmPassword"
          class="form-control"
          placeholder="Confirm new password"
          [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
        />

        <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback d-block">
          <div *ngIf="f['confirmPassword'].errors['required']">
            Confirm password is required
          </div>
        </div>
      </div>

      <button
        class="btn btn-primary w-100 mb-3"
        type="submit"
        [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Changing Password...' : 'Change Password' }}
      </button>

      <div class="text-center">
        <a routerLink="../login">Cancel</a>
      </div>
    </form>

    <div *ngIf="!validToken" class="text-center">
      <a routerLink="../forgot-password">Request a new reset link</a>
    </div>
  </div>
</div>
