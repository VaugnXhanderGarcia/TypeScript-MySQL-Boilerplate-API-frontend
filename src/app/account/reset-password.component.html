<div class="col-md-6 offset-md-3 mt-5">
  <h2>Reset Password</h2>

  <div *ngIf="tokenStatus === TokenStatus.Validating">
    <p>Validating token...</p>
  </div>

  <div *ngIf="tokenStatus === TokenStatus.Invalid">
    <div class="alert alert-danger">
      Token validation failed. The reset password link is invalid or expired.
    </div>
    <a routerLink="/account/forgot-password">Request new reset link</a>
  </div>

  <form *ngIf="tokenStatus === TokenStatus.Valid" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label>Password</label>
      <input
        type="password"
        formControlName="password"
        class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
      />

      <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
        <div *ngIf="f['password'].errors['required']">Password is required</div>
        <div *ngIf="f['password'].errors['minlength']">
          Password must be at least 6 characters
        </div>
      </div>
    </div>

    <div class="mb-3">
      <label>Confirm Password</label>
      <input
        type="password"
        formControlName="confirmPassword"
        class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
      />

      <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
        <div *ngIf="f['confirmPassword'].errors['required']">
          Confirm Password is required
        </div>
        <div *ngIf="f['confirmPassword'].errors['mustMatch']">
          Passwords must match
        </div>
      </div>
    </div>

    <button [disabled]="loading" class="btn btn-primary">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
      Reset Password
    </button>

    <a routerLink="/account/login" class="btn btn-link">Cancel</a>
  </form>
</div>
