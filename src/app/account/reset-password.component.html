<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="card-title mb-4 text-center">Reset Your Password</h3>

        <div *ngIf="validating" class="alert alert-info">
          <span class="spinner-border spinner-border-sm me-2"></span>
          Validating reset link...
        </div>

        <div *ngIf="!validating && !validToken" class="alert alert-danger">
          {{ errorMessage || 'Reset link is invalid or expired.' }}
        </div>

        <form *ngIf="!validating && validToken" [formGroup]="form" (ngSubmit)="onSubmit()">
          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input
              type="password"
              formControlName="password"
              class="form-control"
              [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
              placeholder="Enter new password"
            />

            <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
              <div *ngIf="f['password'].errors['required']">Password is required</div>
              <div *ngIf="f['password'].errors['minlength']">
                Password must be at least 6 characters
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input
              type="password"
              formControlName="confirmPassword"
              class="form-control"
              [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
              placeholder="Confirm new password"
            />

            <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
              <div *ngIf="f['confirmPassword'].errors['required']">
                Confirm password is required
              </div>
            </div>
          </div>

          <div class="d-grid mb-3">
            <button class="btn btn-primary" [disabled]="loading">
              <span
                *ngIf="loading"
                class="spinner-border spinner-border-sm me-1">
              </span>
              Change Password
            </button>
          </div>

          <div class="text-center">
            <a routerLink="../login">Cancel</a>
          </div>
        </form>

        <div *ngIf="!validating && !validToken" class="text-center">
          <a routerLink="../forgot-password">Request a new reset link</a>
        </div>
      </div>
    </div>
  </div>
</div>
