<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h3 class="card-title mb-4">Verify Email</h3>

        <div *ngIf="verifying" class="alert alert-info">
          <span class="spinner-border spinner-border-sm me-2"></span>
          Verifying your email...
        </div>

        <div *ngIf="!verifying && successMessage" class="alert alert-success">
          {{ successMessage }}
        </div>

        <div *ngIf="!verifying && errorMessage" class="alert alert-danger">
          {{ errorMessage }}
        </div>

        <p *ngIf="!verifying" class="text-muted mb-0">
          Please wait...
        </p>
      </div>
    </div>
  </div>
</div>
