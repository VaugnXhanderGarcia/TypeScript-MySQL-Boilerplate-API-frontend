<div class="card">
  <div class="card-header">
    <h4 class="mb-0">Verify Email</h4>
  </div>

  <div class="card-body">
    <div *ngIf="verifying" class="text-center py-4">
      <div class="spinner-border spinner-border-sm me-2"></div>
      Verifying your email address...
    </div>

    <div *ngIf="verified" class="alert alert-success mb-0">
      Email verified successfully. Redirecting you to the login page...
    </div>

    <div *ngIf="failed" class="alert alert-danger mb-0">
      Email verification failed. Please check your verification link or request a new one.
    </div>
  </div>
</div>
