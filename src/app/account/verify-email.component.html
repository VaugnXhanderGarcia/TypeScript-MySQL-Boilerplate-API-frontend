<div class="card">
  <div class="card-header">
    <h4 class="mb-0">Verify Email</h4>
  </div>

  <div class="card-body">
    <div *ngIf="tokenStatus === 'validating'">
      Verifying your email address...
    </div>

    <div *ngIf="tokenStatus === 'verified'" class="text-success">
      Email verified successfully. Redirecting to login...
    </div>

    <div *ngIf="tokenStatus === 'invalid'" class="text-danger">
      Email verification failed. Please try registering again.
    </div>
  </div>
</div>
