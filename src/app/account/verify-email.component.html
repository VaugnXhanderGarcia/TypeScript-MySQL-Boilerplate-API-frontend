<div class="container mt-5" style="max-width: 500px;">
  @if (loading) {
    <div class="alert alert-info">
      Verifying your email...
    </div>
  }

  @if (verified) {
    <div class="alert alert-success">
      Email verified successfully. You can now log in.
    </div>
  }

  @if (error) {
    <div class="alert alert-danger">
      {{ error }}
    </div>
  }
</div>
