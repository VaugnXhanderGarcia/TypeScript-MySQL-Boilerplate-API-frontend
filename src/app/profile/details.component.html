<h1>My Profile</h1>

<div class="card mt-3">
  <div class="card-header">
    <h4>Profile Details</h4>
  </div>

  <div class="card-body" *ngIf="account">
    <p><strong>Name:</strong> {{ account.title }} {{ account.firstName }} {{ account.lastName }}</p>
    <p><strong>Email:</strong> {{ account.email }}</p>
    <p><strong>Role:</strong> {{ account.role }}</p>

    <a routerLink="/profile/update" class="btn btn-primary">
      Update Profile
    </a>
  </div>
</div>

<div class="card mt-4">
  <div class="card-header">
    <h4>Security</h4>
  </div>

  <div class="card-body">
    <button
      (click)="togglePasswordForm()"
      class="btn btn-outline-primary">
      {{ showPasswordForm ? 'Cancel' : 'Change Password' }}
    </button>

    <form *ngIf="showPasswordForm" [formGroup]="passwordForm" (ngSubmit)="onChangePassword()" class="mt-4">
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input
          type="password"
          formControlName="password"
          class="form-control"
          placeholder="Enter new password"
          [ngClass]="{ 'is-invalid': submittedPassword && f['password'].errors }" />

        <div *ngIf="submittedPassword && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input
          type="password"
          formControlName="confirmPassword"
          class="form-control"
          placeholder="Confirm password"
          [ngClass]="{ 'is-invalid': submittedPassword && f['confirmPassword'].errors }" />

        <div *ngIf="submittedPassword && f['confirmPassword'].errors" class="invalid-feedback">
          <div *ngIf="f['confirmPassword'].errors['required']">Confirm password is required</div>
          <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="loadingPassword"
        class="btn btn-primary">
        <span *ngIf="loadingPassword" class="spinner-border spinner-border-sm me-2"></span>
        {{ loadingPassword ? 'Changing...' : 'Change Password' }}
      </button>
    </form>
  </div>
</div>
