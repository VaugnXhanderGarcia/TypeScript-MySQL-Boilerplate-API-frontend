<h1>My Profile</h1>

<div class="card mt-3">
  <div class="card-header">
    <h4>Profile Details</h4>
  </div>

  <div class="card-body" *ngIf="account">
    <p><strong>Name:</strong> {{ account.title }} {{ account.firstName }} {{ account.lastName }}</p>
    <p><strong>Email:</strong> {{ account.email }}</p>
    <p><strong>Role:</strong> {{ account.role }}</p>

    <a routerLink="/profile/update" class="btn btn-primary">
      Update Profile
    </a>
  </div>
</div>
