<div class="card">
  <div class="card-header">
    <h4 class="mb-0">Update Profile</h4>
  </div>

  <div class="card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <select
          formControlName="title"
          class="form-select"
          [ngClass]="{ 'is-invalid': submitted && f['title'].errors }">
          <option value=""></option>
          <option value="Mr">Mr</option>
          <option value="Mrs">Mrs</option>
          <option value="Miss">Miss</option>
          <option value="Ms">Ms</option>
        </select>

        <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">
          Title is required
        </div>
      </div>

      <div class="row">
        <div class="mb-3 col">
          <label class="form-label">First Name</label>
          <input
            type="text"
            formControlName="firstName"
            class="form-control"
            [ngClass]="{ 'is-invalid': submitted && f['firstName'].errors }" />

          <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback">
            First name is required
          </div>
        </div>

        <div class="mb-3 col">
          <label class="form-label">Last Name</label>
          <input
            type="text"
            formControlName="lastName"
            class="form-control"
            [ngClass]="{ 'is-invalid': submitted && f['lastName'].errors }" />

          <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback">
            Last name is required
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="text"
          formControlName="email"
          class="form-control"
          [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" />

        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Email is invalid</div>
        </div>
      </div>

      <h5 class="pt-3">Change Password</h5>
      <p class="text-muted">Leave password fields blank if you do not want to change password.</p>

      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input
          type="password"
          formControlName="password"
          class="form-control"
          [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" />

        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['minlength']">
            Password must be at least 6 characters
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input
          type="password"
          formControlName="confirmPassword"
          class="form-control"
          [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }" />

        <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
          <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
        </div>
      </div>

      <button [disabled]="loading" class="btn btn-primary me-2">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
        Save
      </button>

      <button
        type="button"
        [disabled]="deleting"
        class="btn btn-danger"
        (click)="onDelete()">
        <span *ngIf="deleting" class="spinner-border spinner-border-sm me-1"></span>
        Delete Account
      </button>
    </form>
  </div>
</div>
