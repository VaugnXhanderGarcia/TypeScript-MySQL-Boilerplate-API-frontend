<div class="alert-toast-wrapper" *ngIf="alerts.length">
  <div
    *ngFor="let alert of alerts"
    class="alert-toast"
    [ngClass]="cssClass(alert)"
  >
    <div class="alert-message">
      {{ alert.message }}
    </div>

    <button type="button" class="alert-close" (click)="removeAlert(alert)">
      ×
    </button>
  </div>
</div>
