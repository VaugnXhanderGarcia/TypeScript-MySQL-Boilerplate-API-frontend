<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h4 class="mb-0">Accounts</h4>

    <a routerLink="add" class="btn btn-sm btn-success">
      Add Account
    </a>
  </div>

  <div class="card-body">
    <div *ngIf="loading" class="text-center">
      <span class="spinner-border spinner-border-lg"></span>
    </div>

    <table *ngIf="accounts && accounts.length" class="table table-striped table-bordered">
      <thead>
        <tr>
          <th style="width: 10%">ID</th>
          <th>Name</th>
          <th>Email</th>
          <th style="width: 15%">Role</th>
          <th style="width: 20%">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let account of accounts">
          <td>{{ account.id }}</td>
          <td>{{ account.title }} {{ account.firstName }} {{ account.lastName }}</td>
          <td>{{ account.email }}</td>
          <td>{{ account.role }}</td>
          <td>
            <a routerLink="edit/{{ account.id }}" class="btn btn-sm btn-primary me-1">
              Edit
            </a>

            <button
              class="btn btn-sm btn-danger"
              [disabled]="account.isDeleting"
              (click)="deleteAccount(account.id)">
              <span *ngIf="account.isDeleting" class="spinner-border spinner-border-sm"></span>
              <span *ngIf="!account.isDeleting">Delete</span>
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="accounts && !accounts.length" class="text-muted">
      No accounts found.
    </div>
  </div>
</div>
