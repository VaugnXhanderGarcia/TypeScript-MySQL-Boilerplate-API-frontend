<div class="container mt-4">
  <div class="card">
    <div class="card-header">
      <h4>Accounts</h4>

      <a routerLink="add" class="btn btn-success">
        Add Account
      </a>
    </div>

    <div class="card-body">

      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      

      <table class="table table-bordered table-striped" *ngIf="accounts.length > 0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Role</th>
            <th style="width: 180px;">Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let account of accounts">
            <td>{{ account.id }}</td>
            <td>{{ account.title }}</td>
            <td>{{ account.firstName }}</td>
            <td>{{ account.lastName }}</td>
            <td>{{ account.email }}</td>
            <td>{{ account.role }}</td>

            <td>
              <a routerLink="edit/{{ account.id }}" class="btn btn-sm btn-primary me-2">
                Edit
              </a>

              <button
  class="btn btn-sm btn-danger"
  [disabled]="!account.id"
  (click)="account.id && deleteAccount(account.id)">
  Delete
</button>

              <span
                *ngIf="currentAccount?.id == account.id"
                class="badge bg-secondary">
                Current
              </span>
            </td>
          </tr>
        </tbody>
      </table>

      <p *ngIf="!errorMessage && accounts.length === 0" class="text-muted">
        No accounts loaded yet.
      </p>

    </div>
  </div>
</div>
