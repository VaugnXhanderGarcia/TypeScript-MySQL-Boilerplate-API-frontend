<nav *ngIf="account" class="navbar navbar-expand navbar-dark bg-dark px-3">
  <a routerLink="/" class="navbar-brand">Dashboard</a>

  <div class="navbar-nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item nav-link">Home</a>
    <a routerLink="/profile" routerLinkActive="active" class="nav-item nav-link">Profile</a>
    <a routerLink="/admin/accounts" routerLinkActive="active" class="nav-item nav-link" *ngIf="account.role === 'Admin'">Accounts</a>
  </div>

  <div class="navbar-nav ms-auto">
    <span class="navbar-text text-white me-3">
      {{ account.email }} - {{ account.role }}
    </span>
    <a href="#" class="nav-item nav-link" (click)="logout()">Logout</a>
  </div>
</nav>

<app-alert></app-alert>

<div class="container mt-4">
  <router-outlet></router-outlet>
</div>
